<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Independence County Offroad</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Parts Department</p>
          <h1>Independence County Offroad</h1>
        </div>
        <div class="topbar-actions">
          <div class="status-panel">
            <span id="active-count">0 active</span>
            <span id="unassigned-count">0 need numbers</span>
          </div>
          <button id="settings-button" class="topbar-button" type="button">Settings</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="brand-rail" aria-label="Brands">
          <div id="brand-list" class="brand-list"></div>
        </aside>

        <section class="board">
          <div class="toolbar">
            <label class="search-field">
              <span>Search</span>
              <input id="search-input" type="search" autocomplete="off" placeholder="part, model, number">
            </label>

            <label>
              <span>Family</span>
              <select id="family-filter"></select>
            </label>

            <label>
              <span>Model</span>
              <select id="model-filter"></select>
            </label>

            <label>
              <span>Category</span>
              <select id="category-filter"></select>
            </label>

            <label class="toggle">
              <input id="edit-toggle" type="checkbox">
              <span>Edit</span>
            </label>

            <button id="add-button" class="command-button" type="button">Add Part</button>
          </div>

          <div id="feedback" class="feedback" role="status" aria-live="polite"></div>
          <div id="part-board" class="part-board"></div>
        </section>
      </main>

      <footer class="site-footer">
        Programmed by Matt Gaston
      </footer>
    </div>

    <dialog id="part-dialog">
      <form id="part-form" method="dialog">
        <div class="dialog-header">
          <h2 id="dialog-title">Part</h2>
          <button id="close-dialog" class="icon-button" type="button" aria-label="Close">x</button>
        </div>

        <input id="part-id" type="hidden">

        <div class="form-grid">
          <label>
            <span>Brand</span>
            <input id="part-brand" required>
          </label>
          <label>
            <span>Family</span>
            <input id="part-family">
          </label>
          <label>
            <span>Model</span>
            <input id="part-model">
          </label>
          <label>
            <span>Category</span>
            <input id="part-category">
          </label>
          <label>
            <span>Item</span>
            <input id="part-item" required>
          </label>
          <label>
            <span>Button Text</span>
            <input id="part-button-text">
          </label>
          <label>
            <span>Part Number</span>
            <input id="part-number">
          </label>
          <label>
            <span>Notes</span>
            <input id="part-notes">
          </label>
        </div>

        <div class="dialog-actions">
          <button id="delete-button" class="danger-button" type="button">Delete</button>
          <span class="dialog-spacer"></span>
          <button class="secondary-button" type="button" id="cancel-button">Cancel</button>
          <button class="primary-button" type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="settings-dialog">
      <div class="dialog-header">
        <h2>Settings</h2>
        <button id="close-settings" class="icon-button" type="button" aria-label="Close">x</button>
      </div>

      <div class="settings-layout">
        <section class="settings-panel">
          <div class="settings-panel-header">
            <h3>Theme</h3>
          </div>
          <label class="toggle settings-toggle">
            <input id="theme-toggle" type="checkbox">
            <span>Dark Theme</span>
          </label>
          <div class="settings-inline">
            <label>
              <span>Brand Order</span>
              <select id="brand-order-mode">
                <option value="az">A-Z</option>
                <option value="za">Z-A</option>
                <option value="most">Most Parts</option>
                <option value="least">Least Parts</option>
                <option value="custom">Custom</option>
              </select>
            </label>
            <button id="lock-brand-order-button" class="secondary-button compact-button" type="button">Lock Custom Order</button>
          </div>
        </section>

        <section class="settings-panel">
          <div class="settings-panel-header">
            <h3>Brands</h3>
            <button id="new-brand-button" class="secondary-button compact-button" type="button">New Brand</button>
          </div>
          <div class="brand-settings">
            <div id="settings-brand-list" class="settings-brand-list"></div>

            <form id="brand-form" class="brand-form" method="dialog">
              <input id="brand-id" type="hidden">
              <label>
                <span>Name</span>
                <input id="brand-name" required>
              </label>
              <label>
                <span>Color</span>
                <input id="brand-accent" type="color" value="#2563eb">
              </label>
              <label class="wide-field">
                <span>Logo Path</span>
                <input id="brand-logo" placeholder="assets/logo.png">
              </label>
              <label class="wide-field">
                <span>Upload Logo</span>
                <input id="brand-logo-file" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
              </label>
              <div class="dialog-actions nested-actions">
                <button id="delete-brand-button" class="danger-button" type="button">Delete</button>
                <span class="dialog-spacer"></span>
                <button class="primary-button" type="submit">Save Brand</button>
              </div>
            </form>
          </div>
        </section>

        <section class="settings-panel">
          <div class="settings-panel-header">
            <h3>Saved Brands</h3>
          </div>
          <div id="saved-brand-list" class="saved-brand-list"></div>
        </section>
      </div>

      <div class="dialog-actions">
        <span class="dialog-spacer"></span>
        <button id="done-settings" class="primary-button" type="button">Done</button>
      </div>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
